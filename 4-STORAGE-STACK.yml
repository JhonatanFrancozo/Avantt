AWSTemplateFormatVersion: '2010-09-09'
Description: Storage + Lambda + SNS

Parameters:
  NameTag:
    Type: String
    Default: grupo-01

Resources:

  SourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${NameTag}-source-${AWS::AccountId}

  BronzeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${NameTag}-bronze-${AWS::AccountId}

  SilverBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${NameTag}-silver-${AWS::AccountId}

  GoldBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${NameTag}-gold-${AWS::AccountId}

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub ${NameTag}-topic

  BronzeLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${NameTag}-bronze-function
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Timeout: 60

      Environment:
        Variables:
          SILVER_BUCKET: !Ref SilverBucket

      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):

              print("Processando camada Bronze")

              return {
                  "statusCode": 200,
                  "body": "Dados recebidos no Bronze"
              }

  SilverLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${NameTag}-silver-function
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Timeout: 60

      Environment:
        Variables:
          GOLD_BUCKET: !Ref GoldBucket

      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):

              print("Transformando dados Silver")

              return {
                  "statusCode": 200,
                  "body": "Dados tratados na Silver"
              }

  GoldLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${NameTag}-gold-function
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Timeout: 60

      Environment:
        Variables:
          TOPIC_ARN: !Ref NotificationTopic

      Code:
        ZipFile: |
          import os
          import boto3

          sns = boto3.client('sns')

          def lambda_handler(event, context):

              sns.publish(
                  TopicArn=os.environ["TOPIC_ARN"],
                  Subject="Pipeline Gold Executado",
                  Message="Dados processados na camada Gold"
              )

              return {
                  "statusCode": 200,
                  "body": "Pipeline Gold concluído"
              }

  EmailLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${NameTag}-email-function
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !Sub arn:aws:iam::${AWS::AccountId}:role/LabRole
      Timeout: 30

      Code:
        ZipFile: |
          def lambda_handler(event, context):

              print(event)

              return {
                  "statusCode": 200,
                  "body": "Email enviado"
              }

  PermissionInvokeFromSNS:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref EmailLambda
      Principal: sns.amazonaws.com
      SourceArn: !Ref NotificationTopic

  Subscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref NotificationTopic
      Protocol: lambda
      Endpoint: !GetAtt EmailLambda.Arn

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId

      DatabaseInput:
        Name: grupo01_db

  GlueCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: grupo01-crawler
      Role: LabRole

      DatabaseName: !Ref GlueDatabase

      Targets:
        S3Targets:
          - Path: !Sub s3://${BronzeBucket}

      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: grupo01-workgroup

      WorkGroupConfiguration:
        ResultConfiguration:
          OutputLocation: !Sub s3://${GoldBucket}/athena-results/

  BronzeLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${NameTag}-bronze-errors
      AlarmDescription: Erros na Lambda Bronze
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref BronzeLambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref NotificationTopic

  SilverLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${NameTag}-silver-errors
      AlarmDescription: Erros na Lambda Silver
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SilverLambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref NotificationTopic

  GoldLambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${NameTag}-gold-errors
      AlarmDescription: Erros na Lambda Gold
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref GoldLambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref NotificationTopic

Outputs:

  SourceBucketName:
    Value: !Ref SourceBucket

  BronzeBucketName:
    Value: !Ref BronzeBucket

  SilverBucketName:
    Value: !Ref SilverBucket

  GoldBucketName:
    Value: !Ref GoldBucket

  BronzeLambdaName:
    Value: !Ref BronzeLambda

  SilverLambdaName:
    Value: !Ref SilverLambda

  GoldLambdaName:
    Value: !Ref GoldLambda